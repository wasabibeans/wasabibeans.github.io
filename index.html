<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthyMeal - AI健康献立と初心者筋トレ管理</title>
<meta name="description" content="AIが毎日の献立と筋トレメニューを自動で提案。栄養バランス管理、しば犬育成、ヘルスケア連携など、健康的な生活をサポートするiOSアプリ。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--surface:#131825;--surface2:#1a2035;--accent:#34d399;--accent2:#06b6d4;--text:#e2e8f0;--text-muted:#94a3b8;--border:rgba(255,255,255,0.06);--gradient:linear-gradient(135deg,#34d399,#06b6d4)}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(52,211,153,0.08),transparent 70%);pointer-events:none;z-index:0}
.container{max-width:720px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
header{padding:60px 0 40px;text-align:center}
.logo{font-size:48px;margin-bottom:12px;display:block;animation:bounce 2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{font-size:28px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.subtitle{font-size:15px;color:var(--text-muted);font-weight:300;line-height:1.7}
.hero-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;margin:32px 0;text-align:center;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gradient)}
.hero-desc{font-size:15px;line-height:1.9;color:var(--text-muted);margin-bottom:28px}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:28px 0}
.feature{background:var(--surface2);border-radius:12px;padding:20px 16px;text-align:center;transition:transform 0.2s,box-shadow 0.2s}
.feature:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(52,211,153,0.1)}
.feature-icon{font-size:28px;margin-bottom:8px;display:block}
.feature-title{font-size:13px;font-weight:500;color:var(--text)}
.app-store-btn{display:inline-flex;align-items:center;gap:10px;background:var(--gradient);color:#0a0e17;font-weight:600;font-size:15px;padding:14px 32px;border-radius:12px;text-decoration:none;transition:opacity 0.2s,transform 0.2s}
.app-store-btn:hover{opacity:0.9;transform:scale(1.02)}
nav{margin:48px 0;display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
nav a{display:inline-block;padding:10px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);text-decoration:none;font-size:14px;transition:all 0.2s}
nav a:hover{color:var(--accent);border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.05)}
footer{text-align:center;padding:40px 0 60px;border-top:1px solid var(--border);margin-top:20px}
footer p{font-size:12px;color:var(--text-muted)}
@media(max-width:480px){h1{font-size:22px}.hero-card{padding:28px 20px}.features{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
<header>
<span class="logo">🐕</span>
<h1>HealthyMeal</h1>
<p class="subtitle">AI健康献立と初心者筋トレ管理</p>
</header>

<div class="hero-card">
<p class="hero-desc">AIが毎日の献立と筋トレメニューを自動で提案。<br>栄養バランス（PFC）管理、しば犬育成、ヘルスケア連携など、<br>健康的な生活をサポートするオールインワンアプリ。</p>
<div class="features">
<div class="feature"><span class="feature-icon">🍽️</span><span class="feature-title">AI献立提案</span></div>
<div class="feature"><span class="feature-icon">💪</span><span class="feature-title">筋トレメニュー</span></div>
<div class="feature"><span class="feature-icon">📊</span><span class="feature-title">PFC栄養管理</span></div>
<div class="feature"><span class="feature-icon">🐕</span><span class="feature-title">しば犬育成</span></div>
<div class="feature"><span class="feature-icon">❤️</span><span class="feature-title">ヘルスケア連携</span></div>
<div class="feature"><span class="feature-icon">🔔</span><span class="feature-title">リマインダー</span></div>
</div>
<a href="https://apps.apple.com/app/id6769673379" class="app-store-btn">📱 App Storeでダウンロード</a>
</div>

<nav>
<a href="support.html">📞 サポート・FAQ</a>
<a href="privacy.html">🔒 プライバシーポリシー</a>
<a href="terms.html">📄 利用規約</a>
</nav>

<footer>
<p>© 2026 WasabiBeans. All rights reserved.</p>
</footer>
</div>
</body>
</html>
