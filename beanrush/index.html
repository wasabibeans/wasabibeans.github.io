<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bean Rush | WasabiBeans</title>
  <meta name="description" content="Bean Rushは、豆を滑らせてスパイスを集め、鍋を目指す2Dスライドパズルゲームです。">
  <style>
    :root { color-scheme: light dark; --bg:#fff7eb; --ink:#24140d; --muted:#6e5346; --card:#ffffffd9; --accent:#d85b23; --line:#ead4bf; }
    @media (prefers-color-scheme: dark) { :root { --bg:#19100b; --ink:#fff4e7; --muted:#d7bda9; --card:#2b1b12d9; --line:#5a3724; } }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); line-height:1.7; }
    a { color:var(--accent); }
    .lang-switch { position:fixed; top:14px; right:14px; z-index:10; display:flex; gap:6px; }
    .lang-switch button { font:inherit; font-size:13px; font-weight:700; cursor:pointer; border:1px solid rgba(255,255,255,.45); background:rgba(0,0,0,.4); color:#fff; border-radius:999px; padding:6px 12px; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); }
    .lang-switch button[aria-current="true"] { background:var(--accent); border-color:var(--accent); }
    .hero { min-height:86vh; display:grid; align-items:end; padding:clamp(28px,6vw,72px); background:linear-gradient(180deg,rgba(34,17,8,.25),rgba(34,17,8,.72)), url("../assets/beanrush-hero.jpg"); background-size:cover; background-position:center; }
    .hero-inner { max-width:760px; color:white; text-shadow:0 3px 16px rgba(0,0,0,.45); }
    h1 { margin:0 0 12px; font-size:clamp(48px,12vw,96px); line-height:.95; letter-spacing:0; }
    .lead { margin:0 0 26px; font-size:clamp(18px,3vw,24px); max-width:620px; }
    .badge { display:inline-flex; align-items:center; border:1px solid rgba(255,255,255,.6); border-radius:8px; padding:10px 14px; color:white; text-decoration:none; font-weight:700; background:rgba(0,0,0,.24); }
    main { max-width:1040px; margin:0 auto; padding:48px 20px 64px; }
    .grid { display:grid; gap:18px; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:22px; }
    h2 { font-size:28px; margin:0 0 16px; }
    h3 { margin:0 0 8px; }
    p { color:var(--muted); }
    footer { border-top:1px solid var(--line); padding:28px 20px; text-align:center; color:var(--muted); }
    footer a { margin:0 8px; }
  </style>
</head>
<body>
  <div class="lang-switch" role="group" aria-label="Language">
    <button type="button" data-lang-btn="ja">日本語</button>
    <button type="button" data-lang-btn="en">English</button>
  </div>
  <section class="hero">
    <div class="hero-inner">
      <h1>Bean Rush</h1>
      <p class="lead" data-i18n="lead">豆をスワイプで滑らせ、スパイスを集めて、あたたかい鍋へ飛び込むスライドパズル。</p>
      <span class="badge" data-i18n="badge">App Storeで配信予定</span>
    </div>
  </section>
  <main>
    <section>
      <h2 data-i18n="s1h2">短く遊べて、じっくり考えられる</h2>
      <div class="grid">
        <article class="card"><h3 data-i18n="c1h3">6x6のスライド盤面</h3><p data-i18n="c1p">上下左右に滑る豆を止まる位置まで動かし、少ない手数でゴールを目指します。</p></article>
        <article class="card"><h3 data-i18n="c2h3">スパイス集め</h3><p data-i18n="c2p">鍋に入る前に、盤面上のスパイスをすべて集める必要があります。</p></article>
        <article class="card"><h3 data-i18n="c3h3">Premium Pack</h3><p data-i18n="c3p">通常30面に加えて、買い切りのPremium Packで追加20面、豆スキン、広告非表示を解放できます。</p></article>
      </div>
    </section>
  </main>
  <footer>
    <p>© 2026 WasabiBeans</p>
    <a href="privacy-policy.html" data-i18n="fp">プライバシーポリシー</a>
    <a href="support.html" data-i18n="fs">サポート</a>
    <a href="terms-of-use.html" data-i18n="ft">利用規約</a>
  </footer>
  <script>
    var I18N = {
      en: {
        __title: "Bean Rush | WasabiBeans",
        __desc: "Bean Rush is a 2D slide puzzle: glide beans, collect spices, and reach the pot.",
        lead: "A slide puzzle where you swipe beans across the board, collect every spice, and dive into a warm pot.",
        badge: "Coming soon to the App Store",
        s1h2: "Quick to play, satisfying to solve",
        c1h3: "6×6 slide board",
        c1p: "Slide beans up, down, left, or right until they stop, and reach the goal in as few moves as you can.",
        c2h3: "Collect the spices",
        c2p: "Gather every spice on the board before you can drop into the pot.",
        c3h3: "Premium Pack",
        c3p: "On top of the 30 standard levels, the one-time Premium Pack unlocks 20 more levels, bean skins, and ad-free play.",
        fp: "Privacy Policy",
        fs: "Support",
        ft: "Terms of Use"
      }
    };
  </script>
  <script>
    (function () {
      var KEY = "wb_lang", DEF = "ja", SUP = ["ja", "en"], T = I18N;
      function pick() {
        try {
          var u = new URLSearchParams(location.search).get("lang");
          if (u && SUP.indexOf(u) >= 0) return u;
          var s = localStorage.getItem(KEY);
          if (s && SUP.indexOf(s) >= 0) return s;
        } catch (e) {}
        var n = (navigator.language || "").toLowerCase();
        for (var i = 0; i < SUP.length; i++) if (n.indexOf(SUP[i]) === 0) return SUP[i];
        return DEF;
      }
      var oT = document.title, mD = document.querySelector('meta[name="description"]'), oD = mD ? mD.getAttribute("content") : "";
      function apply(l) {
        var d = T[l] || {};
        document.documentElement.lang = l;
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          if (el.dataset.ja == null) el.dataset.ja = el.textContent;
          var k = el.getAttribute("data-i18n");
          el.textContent = (l === DEF) ? el.dataset.ja : (d[k] != null ? d[k] : el.dataset.ja);
        });
        document.querySelectorAll("[data-i18n-html]").forEach(function (el) {
          if (el.getAttribute("data-ja-html") == null) el.setAttribute("data-ja-html", el.innerHTML);
          var k = el.getAttribute("data-i18n-html");
          el.innerHTML = (l === DEF) ? el.getAttribute("data-ja-html") : (d[k] != null ? d[k] : el.getAttribute("data-ja-html"));
        });
        document.title = (l === DEF) ? oT : (d.__title || oT);
        if (mD) mD.setAttribute("content", (l === DEF) ? oD : (d.__desc || oD));
        document.querySelectorAll("[data-lang-btn]").forEach(function (b) {
          b.setAttribute("aria-current", b.getAttribute("data-lang-btn") === l ? "true" : "false");
        });
        try { localStorage.setItem(KEY, l); } catch (e) {}
      }
      window.__wbSetLang = apply;
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("[data-lang-btn]").forEach(function (b) {
          b.addEventListener("click", function (e) { e.preventDefault(); apply(b.getAttribute("data-lang-btn")); });
        });
        apply(pick());
      });
    })();
  </script>
</body>
</html>
